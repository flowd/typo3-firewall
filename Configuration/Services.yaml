services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    Flowd\Typo3Firewall\:
        resource: '../Classes/*'
        # Everything under Widgets depends on the optional typo3/cms-dashboard
        # package and is registered conditionally in Services.php instead.
        exclude: '../Classes/Widgets/*'

    Flowd\Phirewall\Middleware:
        autowire: true
        public: true
        arguments:
            $config: '@Flowd\Phirewall\Config'

    Flowd\Typo3Firewall\Backend\Controller\FirewallController:
        autowire: true
        public: true
        arguments:
            $config: '@Flowd\Phirewall\Config'

    Flowd\Phirewall\Config:
        factory: ['@Flowd\Typo3Firewall\ConfigFactory', 'fromConfigurationFile']

    # Tag based registration because the AsEventListener attribute needs TYPO3 13.
    Flowd\Typo3Firewall\EventLog\FirewallEventLogListener:
        tags:
            - name: event.listener
              identifier: 'firewall-event-log/blocklist-matched'
              method: 'onBlocklistMatched'
            - name: event.listener
              identifier: 'firewall-event-log/throttle-exceeded'
              method: 'onThrottleExceeded'
            - name: event.listener
              identifier: 'firewall-event-log/fail2ban-banned'
              method: 'onFail2BanBanned'
            - name: event.listener
              identifier: 'firewall-event-log/allow2ban-banned'
              method: 'onAllow2BanBanned'
            - name: event.listener
              identifier: 'firewall-event-log/safelist-matched'
              method: 'onSafelistMatched'
            - name: event.listener
              identifier: 'firewall-event-log/track-hit'
              method: 'onTrackHit'
            - name: event.listener
              identifier: 'firewall-event-log/firewall-error'
              method: 'onFirewallError'
