<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:layout name="Module" />

<f:section name="Content">
    <f:flashMessages />

    <f:if condition="{integrityIssue}">
        <div class="alert alert-danger d-flex align-items-start gap-2" role="alert">
            <core:icon identifier="actions-exclamation-triangle" size="small" />
            <div>
                <strong><f:translate key="integrity.title" /></strong>
                <div>{integrityIssue}</div>
                <small class="text-muted"><f:translate key="integrity.hint" /></small>
            </div>
        </div>
    </f:if>

    <div class="row">
        <div class="col-lg-8">
            <div class="card mb-4">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>
                        <core:icon identifier="actions-shield" size="small" />
                        <strong><f:translate key="list.title" /></strong>
                        <span class="badge bg-secondary ms-2">{patterns -> f:count()}</span>
                    </span>
                    <f:form action="prune" method="post" class="d-inline">
                        <f:form.button class="btn btn-sm btn-outline-warning" type="submit" title="{f:translate(key: 'action.prune.title')}">
                            <core:icon identifier="actions-delete" size="small" />
                            <f:translate key="action.prune" />
                        </f:form.button>
                    </f:form>
                </div>
                <f:if condition="{patterns}">
                    <f:then>
                        <div class="table-responsive">
                            <table class="table table-striped table-hover mb-0">
                                <thead class="table-light">
                                <tr>
                                    <th style="width: 15%"><f:translate key="field.kind" /></th>
                                    <th style="width: 30%"><f:translate key="field.value" /></th>
                                    <th style="width: 10%"><f:translate key="field.target" /></th>
                                    <th style="width: 10%"><f:translate key="field.expiresAt" /></th>
                                    <th style="width: 10%"><f:translate key="field.addedAt" /></th>
                                    <th style="width: 10%"><f:translate key="field.lastModifiedAt" /></th>
                                    <th style="width: 15%" class="text-end"><f:translate key="field.actions" /></th>
                                </tr>
                                </thead>
                                <tbody>
                                <f:for each="{patterns}" as="row">
                                    <f:variable name="isExpired" value="{f:if(condition: '{row.expiresAt} && {row.expiresAt} < {now}', then: '1', else: '0')}" />
                                    <tr class="{f:if(condition: isExpired, then: 'table-warning opacity-75')}">
                                        <td>
                                            <f:switch expression="{row.kind}">
                                                <f:case value="ip"><span class="badge text-bg-primary"><f:translate key="kind.{row.kind}" default="{row.kind}" /></span></f:case>
                                                <f:case value="cidr"><span class="badge text-bg-primary"><f:translate key="kind.{row.kind}" default="{row.kind}" /></span></f:case>
                                                <f:case value="path_prefix"><span class="badge text-bg-info"><f:translate key="kind.{row.kind}" default="{row.kind}" /></span></f:case>
                                                <f:case value="path_exact"><span class="badge text-bg-info"><f:translate key="kind.{row.kind}" default="{row.kind}" /></span></f:case>
                                                <f:case value="path_regex"><span class="badge text-bg-warning"><f:translate key="kind.{row.kind}" default="{row.kind}" /></span></f:case>
                                                <f:case value="header_exact"><span class="badge text-bg-secondary"><f:translate key="kind.{row.kind}" default="{row.kind}" /></span></f:case>
                                                <f:case value="header_regex"><span class="badge text-bg-warning"><f:translate key="kind.{row.kind}" default="{row.kind}" /></span></f:case>
                                                <f:case value="request_regex"><span class="badge text-bg-warning"><f:translate key="kind.{row.kind}" default="{row.kind}" /></span></f:case>
                                                <f:defaultCase><span class="badge text-bg-dark"><f:translate key="kind.{row.kind}" default="{row.kind}" /></span></f:defaultCase>
                                            </f:switch>
                                        </td>
                                        <td>
                                            <code class="text-break"><f:format.htmlspecialchars>{row.value}</f:format.htmlspecialchars></code>
                                        </td>
                                        <td>
                                            <f:if condition="{row.target}">
                                                <f:then><code><f:format.htmlspecialchars>{row.target}</f:format.htmlspecialchars></code></f:then>
                                                <f:else><span class="text-muted">-</span></f:else>
                                            </f:if>
                                        </td>
                                        <td>
                                            <f:if condition="{row.expiresAt}">
                                                <f:then>
                                                    <small class="{f:if(condition: isExpired, then: 'text-danger', else: 'text-muted')}">
                                                        <f:if condition="{isExpired}">
                                                            <f:then><core:icon identifier="actions-clock" size="small" /> </f:then>
                                                        </f:if>
                                                        {row.expiresAt -> f:format.date(format:'d.m.Y H:i')}
                                                    </small>
                                                </f:then>
                                                <f:else><span class="text-muted">-</span></f:else>
                                            </f:if>
                                        </td>
                                        <td>
                                            <f:if condition="{row.addedAt}">
                                                <f:then>
                                                    <small class="text-muted">
                                                        {row.addedAt -> f:format.date(format:'d.m.Y H:i')}
                                                    </small>
                                                </f:then>
                                                <f:else><span class="text-muted">-</span></f:else>
                                            </f:if>
                                        </td>
                                        <td>
                                            <f:if condition="{row.lastModifiedAt}">
                                                <f:then>
                                                    <small class="text-muted">
                                                        {row.lastModifiedAt -> f:format.date(format:'d.m.Y H:i')}
                                                    </small>
                                                </f:then>
                                                <f:else><span class="text-muted">-</span></f:else>
                                            </f:if>
                                        </td>
                                        <td class="text-end text-nowrap">
                                            <f:link.action action="overview" arguments="{editId: row.id}" class="btn btn-sm btn-outline-primary me-1" title="{f:translate(key: 'action.edit')}">
                                                <core:icon identifier="actions-open" size="small" />
                                            </f:link.action>
                                            <button type="button" class="btn btn-sm btn-outline-danger"
                                                title="{f:translate(key: 'action.delete')}"
                                                data-bs-toggle="modal"
                                                data-bs-target="#deleteModal-{row.id}">
                                                <core:icon identifier="actions-delete" size="small" />
                                            </button>

                                            <div class="modal fade" id="deleteModal-{row.id}" tabindex="-1" aria-hidden="true">
                                                <div class="modal-dialog">
                                                    <div class="modal-content">
                                                        <div class="modal-header">
                                                            <h5 class="modal-title"><f:translate key="action.delete.confirmTitle" /></h5>
                                                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                                        </div>
                                                        <div class="modal-body">
                                                            <f:translate key="action.delete.confirm" />
                                                        </div>
                                                        <div class="modal-footer">
                                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                                                <f:translate key="action.cancel" />
                                                            </button>
                                                            <f:form action="delete" method="post" class="d-inline m-0">
                                                                <f:form.hidden name="id" value="{row.id}" />
                                                                <f:form.button class="btn btn-danger" type="submit">
                                                                    <f:translate key="action.delete" />
                                                                </f:form.button>
                                                            </f:form>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </f:for>
                                </tbody>
                            </table>
                        </div>
                    </f:then>
                    <f:else>
                        <div class="card-body text-center py-5">
                            <core:icon identifier="actions-shield" size="large" />
                            <p class="text-muted mt-3 mb-0"><f:translate key="list.empty" /></p>
                        </div>
                    </f:else>
                </f:if>
            </div>
        </div>

        <div class="col-lg-4">
            <!-- Add/Edit Pattern Form (Sidebar) -->
            <div class="card mb-4">
                <div class="card-header">
                    <f:if condition="{isEditMode}">
                        <f:then>
                            <core:icon identifier="actions-open" size="small" />
                            <strong><f:translate key="edit.title" /></strong>
                        </f:then>
                        <f:else>
                            <core:icon identifier="actions-plus" size="small" />
                            <strong><f:translate key="create.title" /></strong>
                        </f:else>
                    </f:if>
                </div>
                <div class="card-body">
                    <f:if condition="{isEditMode}">
                        <div class="alert alert-info mb-3">
                            <core:icon identifier="actions-info" size="small" />
                            <strong><f:translate key="edit.notice.title" /></strong><br />
                            <f:translate key="edit.notice.message" />
                            <f:if condition="{editPattern.id}">
                                <br /><small class="text-muted"><f:translate key="edit.notice.id" />: <code>{editPattern.id}</code></small>
                            </f:if>
                        </div>
                    </f:if>

                    <f:form action="{f:if(condition: isEditMode, then: 'update', else: 'create')}" method="post" objectName="patternEntryDto">
                        <f:if condition="{isEditMode}">
                            <f:form.hidden name="id" value="{editPattern.id}" />
                        </f:if>

                        <div class="mb-3">
                            <label class="form-label" for="firewall-kind">
                                <f:translate key="field.kind" /> <span class="text-danger">*</span>
                            </label>
                            <f:form.select class="form-select" id="firewall-kind" property="kind" required="1" value="{f:if(condition: isEditMode, then: editPattern.kind)}">
                                <f:for each="{kinds}" as="kind">
                                    <f:form.select.option value="{kind.value}">
                                        <f:translate key="kind.{kind.value}" />
                                    </f:form.select.option>
                                </f:for>
                            </f:form.select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="firewall-value">
                                <f:translate key="field.value" /> <span class="text-danger">*</span>
                            </label>
                            <f:form.textfield class="form-control" id="firewall-value" property="value" required="1"
                                value="{f:if(condition: isEditMode, then: editPattern.value)}"
                                placeholder="{f:translate(key: 'field.value.placeholder')}" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="firewall-target">
                                <f:translate key="field.target" />
                            </label>
                            <f:form.textfield class="form-control" id="firewall-target" property="target"
                                value="{f:if(condition: isEditMode, then: editPattern.target)}"
                                placeholder="{f:translate(key: 'field.target.placeholder')}" />
                            <small class="form-text text-muted">
                                <f:translate key="field.target.help" />
                            </small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="firewall-expiresAt">
                                <f:translate key="field.expiresAt" />
                            </label>
                            <f:form.textfield class="form-control" id="firewall-expiresAt" property="expiresAt"
                                type="datetime-local" step="1"
                                value="{f:if(condition: '{isEditMode} && {editPattern.expiresAt}', then: '{editPattern.expiresAt -> f:format.date(format: \'Y-m-d\\\\TH:i:s\')}')}" />
                            <small class="form-text text-muted">
                                <f:translate key="field.expiresAt.help" />
                            </small>
                        </div>

                        <div class="d-grid">
                            <f:if condition="{isEditMode}">
                                <f:then>
                                    <div class="d-flex gap-2">
                                        <f:form.button class="btn btn-primary flex-fill" type="submit">
                                            <core:icon identifier="actions-save" size="small" />
                                            <f:translate key="action.save" />
                                        </f:form.button>
                                        <a href="{f:uri.action(action: 'overview')}" class="btn btn-secondary">
                                            <core:icon identifier="actions-close" size="small" />
                                            <f:translate key="action.cancel" />
                                        </a>
                                    </div>
                                </f:then>
                                <f:else>
                                    <f:form.button class="btn btn-primary" type="submit">
                                        <core:icon identifier="actions-plus" size="small" />
                                        <f:translate key="action.add" />
                                    </f:form.button>
                                </f:else>
                            </f:if>
                        </div>
                    </f:form>
                </div>
            </div>

        </div>
    </div>

    <div class="card mt-4 mb-4">
        <button class="card-header btn btn-link text-start text-decoration-none d-flex justify-content-between align-items-center w-100 py-3"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#examplesCollapse"
                aria-expanded="false"
                aria-controls="examplesCollapse">
            <span>
                <core:icon identifier="actions-question-circle" size="small" />
                <strong class="ms-1"><f:translate key="examples.title" /></strong>
                <span class="text-muted ms-2">- <f:translate key="examples.clickToExpand" /></span>
            </span>
            <core:icon identifier="actions-chevron-down" size="small" />
        </button>
        <div class="collapse" id="examplesCollapse">
            <div class="card-body">
                <p class="text-muted mb-3">
                    <f:translate key="examples.intro" />
                </p>
                <div class="table-responsive">
                    <table class="table table-sm table-bordered mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 25%"><f:translate key="examples.table.header.kind" /></th>
                                <th style="width: 30%"><f:translate key="examples.table.header.value" /></th>
                                <th><f:translate key="examples.table.header.description" /></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><span class="badge text-bg-primary"><f:translate key="examples.table.ip.kind" /></span></td>
                                <td><code><f:translate key="examples.table.ip.value" /></code></td>
                                <td><small><f:translate key="examples.table.ip.description" /></small></td>
                            </tr>
                            <tr>
                                <td><span class="badge text-bg-primary"><f:translate key="examples.table.ip_cidr.kind" /></span></td>
                                <td><code><f:translate key="examples.table.ip_cidr.value" /></code></td>
                                <td><small><f:translate key="examples.table.ip_cidr.description" /></small></td>
                            </tr>
                            <tr>
                                <td><span class="badge text-bg-info"><f:translate key="examples.table.path_prefix.kind" /></span></td>
                                <td><code><f:translate key="examples.table.path_prefix.value" /></code></td>
                                <td><small><f:translate key="examples.table.path_prefix.description" /></small></td>
                            </tr>
                            <tr>
                                <td><span class="badge text-bg-info"><f:translate key="examples.table.path_exact.kind" /></span></td>
                                <td><code><f:translate key="examples.table.path_exact.value" /></code></td>
                                <td><small><f:translate key="examples.table.path_exact.description" /></small></td>
                            </tr>
                            <tr>
                                <td><span class="badge text-bg-warning"><f:translate key="examples.table.path_regex.kind" /></span></td>
                                <td><code><f:translate key="examples.table.path_regex.value" /></code></td>
                                <td><small><f:translate key="examples.table.path_regex.description" /></small></td>
                            </tr>
                            <tr>
                                <td><span class="badge text-bg-secondary"><f:translate key="examples.table.header_exact.kind" /></span></td>
                                <td><code><f:translate key="examples.table.header_exact.value" /></code></td>
                                <td><small><f:translate key="examples.table.header_exact.description" /></small></td>
                            </tr>
                            <tr>
                                <td><span class="badge text-bg-warning"><f:translate key="examples.table.header_regex.kind" /></span></td>
                                <td>
                                    <small class="text-muted"><f:translate key="examples.table.header_regex.value.prefix" /></small>
                                    <code><f:translate key="examples.table.header_regex.value" /></code><br />
                                    <small class="text-muted"><f:translate key="examples.table.header_regex.target.prefix" /></small>
                                    <code><f:translate key="examples.table.header_regex.target" /></code>
                                </td>
                                <td><small><f:translate key="examples.table.header_regex.description" /></small></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</f:section>

</html>
